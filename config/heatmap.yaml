# System widgets (non-strategy cells)
widgets:
  regime_status:
    row: 1
    col: 1
    span_cols: 1
    span_rows: 1
    type: regime
  system_log:
    row: 8
    col: 1
    span_cols: 6
    span_rows: 1
    type: log

# Color health thresholds
thresholds:
  profitable_win_rate: 0.60
  profitable_pnl: 0.0
  idle_threshold_seconds: 300
  bleeding_pnl: -100.0
  bleeding_win_rate: 0.35
  near_zero_pnl: 10.0

# Color palette
colors:
  profitable: "#065f46"
  amber: "#92400e"
  idle: "#1f2937"
  bleeding: "#7f1d1d"
  card_bg: "#1e293b"
  background: "#0f172a"
  text_main: "#f8fafc"
  text_dim: "#94a3b8"
  accent: "#38bdf8"
