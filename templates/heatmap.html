<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syngex Heatmap Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.4/dist/socket.io.min.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --gap: 0.75rem;
            --border: #334155;

            /* Health colors */
            --color-profitable: #065f46;
            --color-amber: #92400e;
            --color-idle: #1f2937;
            --color-bleeding: #7f1d1d;
            --color-void: #111827;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            padding: 16px;
            min-height: 100vh;
        }

        /* ── Header ─────────────────────────────────────────── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--gap);
            padding: 0 4px;
        }
        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .header-title span { color: var(--accent); }
        .header-center {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: var(--text-main);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }
        .header-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            font-size: 0.8rem;
            color: var(--text-dim);
        }
        .regime-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.25rem 0.75rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .regime-pos-gamma { background: #065f46; color: #a7f3d0; }
        .regime-neg-gamma { background: #7f1d1d; color: #fca5a5; }
        .regime-neutral { background: #374151; color: #d1d5db; }
        .regime-unknown { background: #1e293b; color: #94a3b8; }

        /* ── SECTION 1: Summary Stats Row ───────────────────── */
        .summary-stats-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: var(--gap);
            margin-bottom: var(--gap);
        }
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        .stat-card-inline {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }
        .stat-label {
            font-size: 0.6rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }
        .stat-value {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 2.0em;
            font-weight: 700;
            color: var(--text-main);
        }
        .stat-value.accent { color: var(--accent); }
        .stat-value.positive { color: #10b981; }
        .stat-value.negative { color: #ef4444; }
        .stat-value-inline {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 2.0em;
            font-weight: 700;
            color: var(--text-main);
        }
        .stat-value-inline.positive { color: #10b981; }
        .stat-value-inline.negative { color: #ef4444; }
        .stat-label.centered {
            text-align: center;
        }
        .stat-value.centered {
            text-align: center;
        }
        .stat-delta-inline {
            font-size: 0.75rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-weight: 600;
            white-space: nowrap;
        }
        .stat-delta-inline.up { color: #10b981; }
        .stat-delta-inline.down { color: #ef4444; }
        .stat-delta.up { color: #10b981; }
        .stat-delta.down { color: #ef4444; }
        .stat-delta.neutral { color: var(--text-dim); }

        /* ── SECTION 2: Main Chart Area ─────────────────────── */
        .main-chart-area {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: var(--gap);
            margin-bottom: var(--gap);
        }

        /* Gamma Profile Chart */
        .gamma-profile-chart {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            min-height: 280px;
        }
        .chart-title {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }
        .chart-canvas-wrap {
            flex: 1;
            position: relative;
            min-height: 0;
        }
        .chart-canvas-wrap canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Gamma Wall Info */
        .gamma-wall-info {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            min-height: 280px;
        }
        .wall-dominant {
            background: #0f172a;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.6rem 0.75rem;
        }
        .wall-dominant-label {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
            margin-bottom: 0.3rem;
        }
        .wall-dominant-value {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 1.375rem;
            font-weight: 700;
        }
        .wall-dominant-value.call { color: #10b981; }
        .wall-dominant-value.put { color: #ef4444; }
        .wall-dominant-meta {
            font-size: 1.375rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            margin-top: 0.15rem;
            line-height: 1.3;
        }
        .wall-dominant-meta .gex-val.positive { color: #10b981; }
        .wall-dominant-meta .gex-val.negative { color: #ef4444; }
        .wall-table-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-dim);
        }
        .wall-table {
            width: 100%;
            font-size: 0.9375rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            border-collapse: collapse;
        }
        .wall-table th {
            text-align: left;
            color: var(--text-dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            padding: 0.2rem 0.3rem;
            border-bottom: 1px solid var(--border);
        }
        .wall-table td {
            font-size: 0.9375rem;
            padding: 0.2rem 0.3rem;
            color: var(--text-main);
            border-bottom: 1px solid #1e293b;
        }
        .wall-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.3rem;
            vertical-align: middle;
        }
        .wall-dot.call { background: #10b981; }
        .wall-dot.put { background: #ef4444; }

        /* ── SECTION 3: Strategy Grid ───────────────────────── */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: minmax(120px, auto);
            gap: var(--gap);
            margin-bottom: var(--gap);
        }

        /* ── Card ────────────────────────────────────────────── */
        .card {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            transition: border-color 0.3s ease;
            min-height: 180px;
        }
        .card:hover {
            border-color: var(--accent);
        }

        /* Health pulse overlay */
        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            opacity: 0.15;
            z-index: 0;
            transition: background 0.5s ease;
        }
        .card.health-profitable::before { background: var(--color-profitable); }
        .card.health-amber::before { background: var(--color-amber); }
        .card.health-bleeding::before { background: var(--color-bleeding); }
        .card.health-idle::before { background: var(--color-idle); }
        .card.health-void::before { background: var(--color-void); }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.6rem 0.8rem 0.4rem;
            position: relative;
            z-index: 1;
        }
        .card-name {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            color: var(--text-dim);
            line-height: 1.2;
        }
        .card-layer {
            font-size: 0.65rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-right: 0.4rem;
        }

        /* ── Directional bar (top of tile) ───────────────────── */
        .card-dir-bar {
            height: 6px;
            position: relative;
            z-index: 1;
            margin: 0.5rem 0.65rem 0;
            border-radius: 3px;
            transition: background 0.5s ease;
        }
        .card-dir-bar.long { background: #10b981; }
        .card-dir-bar.short { background: #ef4444; }
        .card-dir-bar.void { background: #374151; }

        /* Status LED */
        .led {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .led-active {
            background: #10b981;
            animation: pulse-green 2s ease-in-out infinite;
        }
        .led-idle {
            background: #64748b;
        }
        .led-void {
            background: #374151;
        }
        .led-error {
            background: #ef4444;
            animation: pulse-red 1s ease-in-out infinite;
        }

        @keyframes pulse-green {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px #10b981; }
            50% { opacity: 0.5; box-shadow: 0 0 8px #10b981; }
        }
        @keyframes pulse-red {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px #ef4444; }
            50% { opacity: 0.4; box-shadow: 0 0 10px #ef4444; }
        }

        /* ── Signal Tile body — Command Center layout ────────── */
        .card-body {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 0.6rem 0.8rem;
            position: relative;
            z-index: 1;
            gap: 0.3rem;
            min-height: 0;
        }

        /* Header row — MASSIVE font (2.5x base) */
        .card-signal-header {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 2.0em;
            font-weight: 900;
            letter-spacing: 0.04em;
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            line-height: 1.1;
        }
        .card-signal-header .dir-icon {
            margin-right: 0.15em;
        }
        .card-signal-header .dir-icon.long { color: #10b981; }
        .card-signal-header .dir-icon.short { color: #ef4444; }
        .card-signal-header .dir-text {
            font-weight: 900;
            text-transform: uppercase;
        }
        .card-signal-header .dir-text.long { color: #10b981; }
        .card-signal-header .dir-text.short { color: #ef4444; }
        .card-signal-header .conf-badge {
            font-size: 0.5em;
            font-weight: 800;
            padding: 0.15em 0.5em;
            border-radius: 6px;
            background: rgba(255,255,255,0.15);
            white-space: nowrap;
            align-self: center;
            line-height: 1;
        }

        /* Thick separator */
        .card-separator {
            height: 3px;
            background: rgba(255,255,255,0.25);
            border-radius: 2px;
            margin: 0.15rem 0;
        }

        /* Data rows — MASSIVE font (2x base) */
        .card-data-row {
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 1.6em;
            font-weight: 700;
            line-height: 1.2;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }
        .card-data-row .data-label {
            font-size: 0.85em;
            font-weight: 800;
            opacity: 0.7;
            min-width: 0;
        }
        .card-data-row .data-value {
            font-size: 1em;
            font-weight: 700;
        }
        .card-data-row .data-at {
            font-size: 1em;
            font-weight: 800;
            opacity: 0.6;
        }

        /* No signal state */
        .card-no-signal {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            position: relative;
            z-index: 1;
        }
        .card-no-signal span {
            font-size: 0.85rem;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            font-weight: 600;
        }

        /* Card footer */
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.3rem 0.65rem;
            font-size: 1.2rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            position: relative;
            z-index: 1;
        }
        .card-last {
            color: var(--text-dim);
        }
        .card-pnl {
            font-weight: 600;
        }
        .card-pnl.positive { color: #10b981; }
        .card-pnl.negative { color: #ef4444; }
        .card-pnl.neutral { color: var(--text-dim); }

        /* Confidence bar */
        .confidence-bar {
            height: 2px;
            width: 100%;
            background: #334155;
            position: relative;
            z-index: 1;
        }
        .confidence-bar-fill {
            height: 100%;
            transition: width 0.5s ease, background 0.5s ease;
        }

        /* ── SECTION 4: Layer 2 Overview Card ───────────────── */
        .card-l2-overview {
            grid-column: span 2;
        }
        .l2-overview-content {
            display: flex;
            gap: 1rem;
            padding: 0.5rem 0.75rem;
            position: relative;
            z-index: 1;
            align-items: center;
        }
        .l2-metric {
            text-align: center;
            flex: 1;
        }
        .l2-metric-label {
            font-size: 0.55rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .l2-metric-value {
            font-size: 1rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            margin-top: 0.15rem;
        }

        /* ── SECTION 5: System Log ──────────────────────────── */
        .card-log {
            grid-column: 1 / -1;
            min-height: 100px;
        }
        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 0.4rem 0.65rem;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 0.65rem;
            line-height: 1.6;
            position: relative;
            z-index: 1;
            scrollbar-width: thin;
            scrollbar-color: #334155 transparent;
        }
        .log-container::-webkit-scrollbar { width: 4px; }
        .log-container::-webkit-scrollbar-track { background: transparent; }
        .log-container::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
        .log-entry { white-space: nowrap; }
        .log-entry .ts { color: #475569; }
        .log-entry.signal { color: #38bdf8; }
        .log-entry.resolved { color: #10b981; }
        .log-entry.error { color: #ef4444; }
        .log-entry.info { color: #94a3b8; }

        /* ── SECTION 6: Total Signals (Extra) ───────────────── */
        .card-extra {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }
        .extra-label {
            font-size: 0.6rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .extra-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
        }

        /* ── Connection status ──────────────────────────────── */
        .conn-status {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.65rem;
            color: var(--text-dim);
        }
        .conn-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .conn-dot.connected { background: #10b981; }
        .conn-dot.disconnected { background: #ef4444; }

        /* ── Sparkline color themes ─────────────────────────── */
        .sparkline-profitable .sparkline-line { stroke: #10b981; }
        .sparkline-amber .sparkline-line { stroke: #f59e0b; }
        .sparkline-bleeding .sparkline-line { stroke: #ef4444; }
        .sparkline-idle .sparkline-line { stroke: #475569; }
        .sparkline-void .sparkline-line { stroke: #1f2937; }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 1200px) {
            .dashboard-grid { grid-template-columns: repeat(4, 1fr); }
            .summary-stats-row { grid-template-columns: repeat(2, 1fr); }
            .main-chart-area { grid-template-columns: 1fr; }
        }
        @media (max-width: 900px) {
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .card-l2-overview { grid-column: span 2; }
        }
        @media (max-width: 600px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .card-l2-overview { grid-column: span 1; }
            .summary-stats-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-title">🕸️ <span>Syngex</span> Heatmap</div>
        <div class="header-center" id="symbolText">—</div>
        <div class="header-meta">
            <span id="regimeBadge" class="regime-badge regime-unknown">—</span>
            <span class="conn-status">
                <span class="conn-dot disconnected" id="connDot"></span>
                <span id="connText">disconnected</span>
            </span>
        </div>
    </div>

    <!-- SECTION 1: Summary Stats Row -->
    <div class="summary-stats-row" id="summary-stats">
        <div class="stat-card">
            <span class="stat-label centered">Underlying Price</span>
            <span class="stat-value centered accent" id="stat-price">—</span>
        </div>
        <div class="stat-card-inline" style="flex-direction:column; gap:0.3rem;">
            <span class="stat-label" style="text-align:center; width:100%;">Net Gamma</span>
            <div style="display:flex; align-items:center; justify-content:space-between; width:100%;">
                <span class="stat-value-inline" id="stat-net-gamma">—</span>
                <span class="stat-delta" id="stat-gamma-delta"></span>
            </div>
        </div>
        <div class="stat-card">
            <span class="stat-label centered">Active Strikes</span>
            <span class="stat-value centered" id="stat-active-strikes">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label centered">Strategies</span>
            <span class="stat-value centered" id="stat-messages">0</span>
        </div>
    </div>

    <!-- SECTION 2: Main Chart Area -->
    <div class="main-chart-area">
        <!-- LEFT: Gamma Profile Chart -->
        <div class="gamma-profile-chart">
            <div class="chart-title">Gamma Profile</div>
            <div class="chart-canvas-wrap">
                <canvas id="gamma-chart"></canvas>
            </div>
        </div>
        <!-- RIGHT: Gamma Wall Info -->
        <div class="gamma-wall-info">
            <div>
                <div class="wall-dominant-label">Dominant Gamma Wall</div>
                <div class="wall-dominant-value" id="wall-dominant-value">—</div>
                <div class="wall-dominant-meta" id="wall-dominant-meta"></div>
            </div>
            <div>
                <div class="wall-table-title">Gamma Walls</div>
                <table class="wall-table" id="wall-table">
                    <thead>
                        <tr>
                            <th></th>
                            <th>Strike</th>
                            <th>Side</th>
                            <th>Net Gamma</th>
                            <th>GEX</th>
                            <th>Contracts</th>
                        </tr>
                    </thead>
                    <tbody id="wall-table-body">
                        <tr><td colspan="6" style="color:#475569;text-align:center;">—</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- SECTION 3: Strategy Grid -->
    <div class="dashboard-grid" id="grid"></div>

    <script>
    // ── Strategy card definitions ──────────────────────────────────
    const STRATEGIES = [
        // Row 1: Layer 1 — Core GEX
        { id: 'gamma_wall_bounce',     label: 'GEX_WALL',        layer: 'L1', row: 1, col: 1 },
        { id: 'magnet_accelerate',     label: 'MAGNET',          layer: 'L1', row: 1, col: 2 },
        { id: 'gamma_flip_breakout',   label: 'FLIP_BREAKOUT',   layer: 'L1', row: 1, col: 3 },
        { id: 'gamma_squeeze',         label: 'GAMMA_SQ',        layer: 'L1', row: 1, col: 4 },
        { id: 'gex_imbalance',         label: 'GEX_IMBAL',       layer: 'L1', row: 1, col: 5 },
        { id: 'confluence_reversal',   label: 'CONFLUENCE',      layer: 'L1', row: 1, col: 6 },
        // Row 2: Layer 1/2 Alpha
        { id: 'vol_compression_range', label: 'VOL_COMP',        layer: 'L1', row: 2, col: 1 },
        { id: 'gex_divergence',        label: 'GEX_DIV',         layer: 'L1', row: 2, col: 2 },
        { id: 'delta_gamma_squeeze',   label: 'DELTA_GAMMA',     layer: 'L2', row: 2, col: 3 },
        { id: 'delta_volume_exhaustion', label: 'DELTA_VOL',      layer: 'L2', row: 2, col: 4 },
        { id: 'obi_aggression_flow',   label: 'OBI_AF',          layer: 'L2', row: 2, col: 5 },

    // ── Health classification ──────────────────────────────────────
    function classifyHealth(strat, dataValid) {
        if (!dataValid) return 'void';
        const { status, win_rate, pnl } = strat;
        if (status === 'error') return 'bleeding';
        if (status === 'idle') return 'idle';
        if (win_rate < 0.35 || pnl < -100) return 'bleeding';
        if (win_rate >= 0.60 && pnl > 0) return 'profitable';
        return 'amber';
    }

    // ── Contrast-aware text color ──────────────────────────────────
    function getContrastColor(hexColor) {
        // Parse hex to RGB
        const r = parseInt(hexColor.slice(1, 3), 16);
        const g = parseInt(hexColor.slice(3, 5), 16);
        const b = parseInt(hexColor.slice(5, 7), 16);
        // Relative luminance
        const lum = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
        return lum > 0.45 ? '#0f172a' : '#f8fafc';
    }

    // ── Sparkline rendering (kept for L2 overview) ──────────────────
    function drawSparkline(canvas, data, colorClass) {
        const ctx = canvas.getContext('2d');
        const w = canvas.width = canvas.offsetWidth * 2;
        const h = canvas.height = canvas.offsetHeight * 2;
        ctx.clearRect(0, 0, w, h);

        // Void state: draw a faint flat line to indicate missing data
        if (colorClass === 'sparkline-void') {
            ctx.beginPath();
            ctx.moveTo(0, h / 2);
            ctx.lineTo(w, h / 2);
            ctx.strokeStyle = '#1f2937';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            return;
        }

        if (!data || data.length < 2) {
            ctx.beginPath();
            ctx.moveTo(0, h / 2);
            ctx.lineTo(w, h / 2);
            ctx.strokeStyle = '#475569';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            return;
        }

        const min = Math.min(...data);
        const max = Math.max(...data);
        const range = max - min || 1;
        const step = w / (data.length - 1);

        const gradient = ctx.createLinearGradient(0, 0, 0, h);
        const isPositive = data[data.length - 1] >= data[0];
        if (colorClass === 'sparkline-profitable') {
            gradient.addColorStop(0, 'rgba(16, 185, 129, 0.15)');
            gradient.addColorStop(1, 'rgba(16, 185, 129, 0)');
        } else if (colorClass === 'sparkline-bleeding') {
            gradient.addColorStop(0, 'rgba(239, 68, 68, 0.15)');
            gradient.addColorStop(1, 'rgba(239, 68, 68, 0)');
        } else {
            gradient.addColorStop(0, 'rgba(148, 163, 184, 0.1)');
            gradient.addColorStop(1, 'rgba(148, 163, 184, 0)');
        }

        ctx.beginPath();
        ctx.moveTo(0, h - ((data[0] - min) / range) * (h - 4) - 2);
        for (let i = 1; i < data.length; i++) {
            const x = i * step;
            const y = h - ((data[i] - min) / range) * (h - 4) - 2;
            ctx.lineTo(x, y);
        }
        ctx.strokeStyle = isPositive ? '#10b981' : (colorClass === 'sparkline-bleeding' ? '#ef4444' : '#64748b');
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.stroke();

        ctx.lineTo(w, h);
        ctx.lineTo(0, h);
        ctx.closePath();
        ctx.fillStyle = gradient;
        ctx.fill();
    }

    // ── Gamma Profile Chart rendering ──────────────────────────────
    function drawGammaChart(canvas, gammaData, underlyingPrice) {
        const ctx = canvas.getContext('2d');
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.parentElement.getBoundingClientRect();
        canvas.width = rect.width * dpr;
        canvas.height = rect.height * dpr;
        canvas.style.width = rect.width + 'px';
        canvas.style.height = rect.height + 'px';
        ctx.scale(dpr, dpr);

        const W = rect.width;
        const H = rect.height;
        const pad = { top: 10, right: 16, bottom: 32, left: 56 };
        const chartW = W - pad.left - pad.right;
        const chartH = H - pad.top - pad.bottom;

        ctx.clearRect(0, 0, W, H);

        // If no data, draw placeholder
        if (!gammaData || gammaData.length === 0) {
            ctx.fillStyle = '#334155';
            ctx.font = '12px system-ui';
            ctx.textAlign = 'center';
            ctx.fillText('Gamma Profile — awaiting data', W / 2, H / 2);
            return;
        }

        // Sort by strike
        const sorted = gammaData.slice().sort((a, b) => a.strike - b.strike);
        const strikes = sorted.map(d => d.strike);
        const gammas = sorted.map(d => d.net_gamma);

        const minGamma = Math.min(...gammas);
        const maxGamma = Math.max(...gammas);
        const gammaRange = (maxGamma - minGamma) || 1;
        const minStrike = strikes[0];
        const maxStrike = strikes[strikes.length - 1];
        const strikeRange = (maxStrike - minStrike) || 1;

        // Zero line
        const zeroY = pad.top + chartH * (1 - (0 - minGamma) / gammaRange);
        ctx.beginPath();
        ctx.moveTo(pad.left, zeroY);
        ctx.lineTo(W - pad.right, zeroY);
        ctx.strokeStyle = '#475569';
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Y-axis labels
        ctx.fillStyle = '#64748b';
        ctx.font = '10px "JetBrains Mono", monospace';
        ctx.textAlign = 'right';
        const yTicks = 5;
        for (let i = 0; i <= yTicks; i++) {
            const val = minGamma + (gammaRange * i / yTicks);
            const y = pad.top + chartH * (1 - i / yTicks);
            ctx.fillText(val >= 0 ? `+${val.toFixed(0)}` : val.toFixed(0), pad.left - 6, y + 3);
        }

        // X-axis labels (strike)
        ctx.textAlign = 'center';
        const xTickCount = Math.min(6, strikes.length);
        const xStep = Math.max(1, Math.floor(strikes.length / xTickCount));
        for (let i = 0; i < strikes.length; i += xStep) {
            const x = pad.left + ((strikes[i] - minStrike) / strikeRange) * chartW;
            ctx.fillText(strikes[i].toFixed(0), x, H - pad.bottom + 16);
        }

        // Area fill (positive = green, negative = red)
        function xForStrike(s) { return pad.left + ((s - minStrike) / strikeRange) * chartW; }
        function yForGamma(g) { return pad.top + chartH * (1 - (g - minGamma) / gammaRange); }

        // Positive area
        ctx.beginPath();
        let started = false;
        for (let i = 0; i < sorted.length; i++) {
            const x = xForStrike(sorted[i].strike);
            const y = yForGamma(sorted[i].net_gamma);
            if (!started) { ctx.moveTo(x, y); started = true; }
            else ctx.lineTo(x, y);
        }
        ctx.lineTo(xForStrike(sorted[sorted.length - 1].strike), zeroY);
        ctx.lineTo(xForStrike(sorted[0].strike), zeroY);
        ctx.closePath();
        ctx.fillStyle = 'rgba(16, 185, 129, 0.08)';
        ctx.fill();

        // Negative area
        ctx.beginPath();
        started = false;
        for (let i = 0; i < sorted.length; i++) {
            const x = xForStrike(sorted[i].strike);
            const y = yForGamma(sorted[i].net_gamma);
            if (!started) { ctx.moveTo(x, y); started = true; }
            else ctx.lineTo(x, y);
        }
        ctx.lineTo(xForStrike(sorted[sorted.length - 1].strike), zeroY);
        ctx.lineTo(xForStrike(sorted[0].strike), zeroY);
        ctx.closePath();
        ctx.fillStyle = 'rgba(239, 68, 68, 0.08)';
        ctx.fill();

        // Line
        ctx.beginPath();
        for (let i = 0; i < sorted.length; i++) {
            const x = xForStrike(sorted[i].strike);
            const y = yForGamma(sorted[i].net_gamma);
            if (i === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
        }
        ctx.strokeStyle = '#38bdf8';
        ctx.lineWidth = 2;
        ctx.lineJoin = 'round';
        ctx.stroke();

        // Current price line
        if (underlyingPrice) {
            const px = xForStrike(underlyingPrice);
            if (px >= pad.left && px <= W - pad.right) {
                ctx.beginPath();
                ctx.moveTo(px, pad.top);
                ctx.lineTo(px, pad.top + chartH);
                ctx.strokeStyle = '#f59e0b';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 3]);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.fillStyle = '#f59e0b';
                ctx.font = 'bold 9px "JetBrains Mono", monospace';
                ctx.textAlign = 'center';
                ctx.fillText(`$${underlyingPrice.toFixed(0)}`, px, pad.top - 2);
            }
        }
    }

    // ── Gamma Wall computation ─────────────────────────────────────
    function computeGammaWalls(gammaData, underlyingPrice) {
        if (!gammaData || gammaData.length === 0) return [];
        let filtered = gammaData;
        if (underlyingPrice != null && underlyingPrice > 0) {
            filtered = gammaData.filter(d =>
                Math.abs(d.strike - underlyingPrice) / underlyingPrice <= 0.02
            );
        }
        // Sort by absolute net_gamma descending
        return filtered
            .map(d => ({ ...d }))
            .sort((a, b) => Math.abs(b.net_gamma) - Math.abs(a.net_gamma));
    }

    function formatGEX(val) {
        if (val === undefined || val === null) return '—';
        if (Math.abs(val) >= 1e6) return (val / 1e6).toFixed(1) + 'M';
        if (Math.abs(val) >= 1e3) return (val / 1e3).toFixed(1) + 'K';
        return val.toFixed(0);
    }

        const sign = pnl >= 0 ? '+' : '';
        return `${sign}$${Math.round(pnl).toLocaleString()}`;
    }

        const d = new Date(ts * 1000);
        return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });

        if (ng !== undefined && ng !== null) {

                    </div>
                `;

                // Directional bar color
                el.dirbar.className = `card-dir-bar ${dirClass}`;

                document.getElementById(`last-${id}`).textContent = `Last: ${formatTime(trigger.timestamp)}`;
                const pnlEl = document.getElementById(`pnl-${id}`);
                const pnlVal = strat.pnl || 0;
                pnlEl.textContent = formatPnL(pnlVal);
                pnlEl.className = `card-pnl ${pnlVal > 0 ? 'positive' : (pnlVal < 0 ? 'negative' : 'neutral')}`;
            }

            const conf = strat.win_rate || 0;
            const confEl = document.getElementById(`conf-${id}`);
            if (health === 'void') {
                confEl.style.width = '0%';
                confEl.style.background = '#1f2937';
            } else {
                confEl.style.width = `${conf * 100}%`;
                confEl.style.background = strat.pnl > 0 ? '#10b981' : (strat.pnl < 0 ? '#ef4444' : '#475569');
            }

            if (id.startsWith('delta_') || id.startsWith('call_put') || id.startsWith('iv_gex')) {
                l2Active++;
                l2Confidence += strat.win_rate || 0;
                l2Count++;
            }
        });

        // L2 overview
        if (l2Count > 0) {
            document.getElementById('l2-signals').textContent = l2Count;
            document.getElementById('l2-confidence').textContent = (l2Confidence / l2Count).toFixed(2);
            document.getElementById('l2-active').textContent = l2Active;
        }

        // Log entries
        const microSignals = data.micro_signals;
        if (microSignals) {
            const sigKey = JSON.stringify(microSignals);
            if (sigKey === prevMicroSignals) return;
            prevMicroSignals = sigKey;

            const logContainer = document.getElementById('log-container');

            Object.entries(microSignals).forEach(([strike, sig]) => {
                const sigText = `SIGNAL:${sig.strategy}:${sig.direction}:conf=${sig.confidence.toFixed(2)}:K${strike}`;
                if (logSeen.has(sigText)) return;
                logSeen.add(sigText);

                const ts = sig.timestamp
                    ? new Date(sig.timestamp * 1000).toLocaleTimeString('en-US', { hour12: false })
                    : '';
                const entry = document.createElement('div');
                entry.className = 'log-entry signal';
                entry.innerHTML = `<span class="ts">[${ts}]</span> SIGNAL: ${sig.strategy} ${sig.direction} conf=${sig.confidence.toFixed(2)} K${strike}`;
                logContainer.appendChild(entry);
                logEntries.push(entry);
            });

            while (logEntries.length > LOG_MAX) {
                logContainer.removeChild(logEntries.shift());
            }
            logContainer.scrollTop = logContainer.scrollHeight;
        }

        // Extra cell
        document.getElementById('extra-signals').textContent = data.strategies
            ? Object.values(data.strategies).reduce((sum, s) => sum + (s.signal_count || 0), 0)
            : 0;
        document.getElementById('extra-time').textContent = data.last_updated || new Date().toLocaleTimeString();
    }

    // ── Initial empty state ────────────────────────────────────────
    </script>
</body>
</html>
